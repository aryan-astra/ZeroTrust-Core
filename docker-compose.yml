version: "3.8"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: zerotrust
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=zerotrust
      - DB_USER=root
      - DB_PASSWORD=password
      - JWT_SECRET_KEY=zerotrust-production-secret-2026
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/models:/app/models
      - ./backend/data/processed:/app/data/processed
      - ./Datasets:/app/../Datasets

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
